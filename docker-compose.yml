services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Supply your Google AI Studio key here or via a .env file / shell export.
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    restart: unless-stopped
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
